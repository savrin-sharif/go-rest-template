version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: go-rest-template:local
    ports:
      - "8080:8080"
    environment:
      APP_LOG_LEVEL: debug
      APP_SERVER_PORT: 8080
      APP_DATABASE_URL: postgres://postgres:postgres@db:5432/app_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/server"]

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
