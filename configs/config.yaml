app:
  name: go-rest-template

server:
  port: 8080
  shutdownTimeout: 10s
  readTimeout: 15s
  writeTimeout: 15s
  idleTimeout: 60s
  allowedOrigins:
    - http://localhost:3000
    - http://127.0.0.1:3000

database:
  # APP_DATABASE_URL is required (env-only).
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: 5m

log:
  level: info
